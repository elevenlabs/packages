version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      remark-cjk-friendly:
        patterns:
          - "remark-cjk-friendly"
          - "remark-cjk-friendly-gfm-strikethrough"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "expo"
          - "expo-*"
          - "@expo/*"
          - "react-native"
          - "react-native-*"
      eslint:
        patterns:
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "eslint"
          - "eslint-*"
          - "typescript-eslint"
      tailwindcss:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
      tanstack-start-router:
        patterns:
          - "@tanstack/react-router"
          - "@tanstack/react-router-*"
          - "@tanstack/react-start"
          - "@tanstack/react-start-*"
          - "@tanstack/router-*"
          - "@tanstack/start-*"
      vite:
        patterns:
          - "@vitejs/*"
          - "@vitest/*"
          - "vite"
          - "vite-*"
          - "vitest"
