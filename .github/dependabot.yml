version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      eslint:
        patterns:
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "eslint"
          - "eslint-*"
          - "typescript-eslint"
      tanstack-start-router:
        patterns:
          - "@tanstack/react-router"
          - "@tanstack/react-router-*"
          - "@tanstack/react-start"
          - "@tanstack/react-start-*"
          - "@tanstack/router-*"
          - "@tanstack/start-*"
      vite:
        patterns:
          - "@vitejs/*"
          - "@vitest/*"
          - "vite"
          - "vite-*"
          - "vitest"
    ignore:
      - dependency-name: "eslint"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@eslint/*"
        update-types:
          - "version-update:semver-major"
